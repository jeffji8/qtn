<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>理想汽车报价单</title>
<link rel="icon" type="image/png" href="/logo.png" sizes="1024x1024" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#111827" />
<style>
* {
box-sizing: border-box;
font-family: "Microsoft YaHei", Arial, sans-serif;
-webkit-tap-highlight-color: transparent;
}
body {
margin: 0;
background: #f6f7fb;
color: #222;
font-size: 14px;
}
.container {
max-width: 480px;
margin: 0 auto;
padding: 10px 10px 20px;
}
.panel,.quote-card,.image-preview-card {
background: #fff;
border-radius: 14px;
box-shadow: 0 4px 14px rgba(0,0,0,0.06);
padding: 14px;
margin-bottom: 12px;
}
.title-bar {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 8px;
}
.title-logo {
width: 32px;
height: 32px;
border-radius: 6px;
}
.quote-logo {
width: 28px;
height: 28px;
border-radius: 4px;
}
.quote-head {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 12px;
}
.title {
font-size: 20px;
font-weight: 700;
color: #111827;
margin-bottom: 0;
}
.sub {
font-size: 12px;
color: #6b7280;
margin-bottom: 14px;
line-height: 1.6;
}
.form-grid {
display: grid;
grid-template-columns: 1fr;
gap: 10px;
}
.form-group {
display: flex;
flex-direction: column;
}
label {
font-size: 13px;
color: #374151;
margin-bottom: 5px;
font-weight: 600;
}
input,select {
width: 100%;
border: 1px solid #d1d5db;
border-radius: 10px;
padding: 10px 12px;
font-size: 14px;
outline: none;
background: #fff;
}
input:focus,select:focus {
border-color: #2563eb;
box-shadow: 0 0 0 2px rgba(37,99,235,0.12);
}
input[readonly] {
background: #f3f4f6;
}
.btn-row {
display: flex;
gap: 8px;
margin-top: 14px;
flex-wrap: wrap;
}
button {
flex: 1;
border: none;
border-radius: 10px;
padding: 11px 12px;
font-size: 14px;
cursor: pointer;
min-width: 100px;
}
.btn-primary {
background: #2563eb;
color: #fff;
}
.btn-secondary {
background: #e5e7eb;
color: #111827;
}
.btn-export {
background: #111827;
color: #fff;
}
.btn-preview-close {
background: #e5e7eb;
color: #111827;
margin-top: 12px;
}
.car-name {
font-size: 18px;
font-weight: 700;
color: #111827;
margin-bottom: 0;
}
.quote-lines {
margin-bottom: 10px;
}
.line {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 7px 0;
font-size: 14px;
gap: 10px;
}
.line .label {
color: #111827;
padding-right: 10px;
line-height: 1.5;
}
.line .value {
color: #374151;
text-align: right;
font-weight: 600;
word-break: break-all;
line-height: 1.5;
}
.divider {
border-top: 1px dashed #cbd5e1;
margin: 8px 0;
}
.section-hint {
font-size: 12px;
color: #6b7280;
margin: 4px 0 2px;
}
.money-red .big-money,.money-red .money-label {
color: #7f1d1d !important;
}
.strong-line {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 0;
border-top: 1px dashed #cbd5e1;
font-size: 15px;
font-weight: 700;
color: #111827;
gap: 10px;
}
.strong-line .value {
font-size: 16px;
font-weight: 700;
color: #7f1d1d;
text-align: right;
}
.strong-line .label {
color: #111827;
font-weight: 700;
}
.strong-line-same-size {
display: flex;
justify-content: space-between;
align-items: center;
padding: 7px 0;
font-size: 15px;
font-weight: 700;
gap: 10px;
}
.strong-line-same-size .label {
color: #111827;
font-weight: 700;
padding-right: 10px;
line-height: 1.5;
}
.strong-line-same-size .value {
color: #374151;
text-align: right;
font-size: 16px;
font-weight: 700;
word-break: break-all;
line-height: 1.5;
}
.top-money {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 8px;
margin: 14px 0 10px;
padding-top: 14px;
border-top: 1px dashed #cbd5e1;
}
.money-box {
padding: 4px 0;
min-width: 0;
}
.money-box.left {
text-align: left;
}
.money-box.center {
text-align: center;
}
.money-box.right {
text-align: right;
}
.big-money {
font-size: 18px;
font-weight: 700;
color: #111827;
line-height: 1.2;
white-space: nowrap;
}
.money-label {
font-size: 12px;
color: #9ca3af;
margin-top: 3px;
line-height: 1.4;
}
.section-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 0;
border-top: 1px dashed #cbd5e1;
font-size: 14px;
gap: 12px;
}
.section-row strong {
color: #111827;
font-weight: 600;
}
.finance-first-row {
position: relative;
border-top: none;
padding-top: 25px;
}
.finance-first-row::before,.finance-first-row::after {
content: "";
position: absolute;
left: 0;
right: 0;
height: 0;
border-top: 1px dashed #cbd5e1;
}
.finance-first-row::before {
top: 0;
}
.finance-first-row::after {
top: 8px;
}
.scheme-value {
color: #374151;
text-align: right;
}
.stage-block {
border-top: 1px dashed #cbd5e1;
padding: 14px 0 6px;
}
.stage-title {
display: flex;
align-items: center;
gap: 8px;
font-size: 16px;
font-weight: 700;
color: #111827;
margin-bottom: 10px;
flex-wrap: wrap;
}
.tag {
font-size: 11px;
color: #6b7280;
background: #f3f4f6;
padding: 2px 7px;
border-radius: 8px;
}
.detail-line {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 6px 0;
font-size: 14px;
gap: 10px;
}
.detail-left {
color: #111827;
}
.detail-right {
color: #374151;
text-align: right;
}
.rate-note {
color: #6b7280;
font-size: 12px;
text-align: right;
margin-top: 2px;
}
.downpay-wrap {
padding: 6px 0 2px;
}
.downpay-top {
display: flex;
justify-content: flex-end;
align-items: center;
gap: 10px;
margin-bottom: 10px;
font-size: 14px;
flex-wrap: wrap;
}
#downPaymentPercentText {
color: #6b7280;
font-weight: 600;
min-width: 44px;
text-align: right;
}
.amount-input-wrap {
display: flex;
align-items: center;
background: #f3f4f6;
border-radius: 10px;
padding: 0 10px;
min-width: 130px;
border: 1px solid #e5e7eb;
}
.amount-input-wrap span {
color: #6b7280;
margin-right: 6px;
font-weight: 600;
}
#downPaymentAmountInput {
border: none;
background: transparent;
padding: 8px 0;
box-shadow: none;
outline: none;
font-weight: 700;
color: #111827;
text-align: right;
}
#downPaymentAmountInput:focus {
border: none;
box-shadow: none;
}
input[type="range"] {
-webkit-appearance: none;
appearance: none;
width: 100%;
height: 6px;
border-radius: 999px;
background: linear-gradient(to right,#0f766e 0%,#0f766e 30%,#e5e7eb 30%,#e5e7eb 100%);
outline: none;
padding: 0;
border: none;
box-shadow: none;
}
input[type="range"]:focus {
box-shadow: none;
}
input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
appearance: none;
width: 24px;
height: 24px;
border-radius: 50%;
background: #ffffff;
border: 2px solid #d1d5db;
box-shadow: 0 2px 8px rgba(0,0,0,0.15);
cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
width: 24px;
height: 24px;
border-radius: 50%;
background: #ffffff;
border: 2px solid #d1d5db;
box-shadow: 0 2px 8px rgba(0,0,0,0.15);
cursor: pointer;
}
.downpay-scale {
display: flex;
justify-content: space-between;
color: #9ca3af;
font-size: 12px;
margin-top: 8px;
}
.config-box {
border: 1px solid #e5e7eb;
border-radius: 12px;
padding: 10px 12px;
background: #fafafa;
}
.config-empty {
color: #9ca3af;
font-size: 13px;
line-height: 1.6;
}
.config-item {
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
padding: 8px 0;
border-bottom: 1px solid #eceff3;
}
.config-item:last-child {
border-bottom: none;
}
.config-left {
display: flex;
align-items: center;
gap: 8px;
flex: 1;
min-width: 0;
}
.config-left input[type="checkbox"] {
width: 16px;
height: 16px;
margin: 0;
flex: 0 0 auto;
}
.config-name {
color: #111827;
line-height: 1.4;
word-break: break-all;
}
.config-price,.discount-price {
color: #374151;
font-weight: 700;
white-space: nowrap;
font-size: 13px;
}
.disabled-item {
opacity: 0.45;
}
.min-downpay-note {
margin-top: 6px;
font-size: 12px;
color: #7c2d12;
line-height: 1.4;
}
.image-preview-card {
display: none;
}
.image-preview-title {
font-size: 16px;
font-weight: 700;
color: #111827;
margin-bottom: 8px;
}
.image-preview-hint {
font-size: 12px;
color: #6b7280;
margin-bottom: 10px;
line-height: 1.6;
}
.image-preview-wrap {
border: 1px solid #e5e7eb;
border-radius: 12px;
overflow: hidden;
background: #fff;
}
.image-preview-wrap img {
width: 100%;
display: block;
-webkit-user-select: none;
user-select: none;
}
.multi-select {
position: relative;
width: 100%;
}
.multi-select-trigger {
width: 100%;
border: 1px solid #d1d5db;
border-radius: 10px;
padding: 10px 40px 10px 12px;
font-size: 14px;
background: #fff;
color: #111827;
cursor: pointer;
position: relative;
min-height: 42px;
display: flex;
align-items: center;
line-height: 1.5;
}
.multi-select-trigger:focus,.multi-select.open .multi-select-trigger {
border-color: #2563eb;
box-shadow: 0 0 0 2px rgba(37,99,235,0.12);
}
.multi-select-trigger::after {
content: "";
position: absolute;
right: 14px;
top: 50%;
width: 8px;
height: 8px;
border-right: 2px solid #6b7280;
border-bottom: 2px solid #6b7280;
transform: translateY(-70%) rotate(45deg);
transition: transform 0.2s ease;
}
.multi-select.open .multi-select-trigger::after {
transform: translateY(-30%) rotate(-135deg);
}
.multi-select-placeholder {
color: #9ca3af;
}
.multi-select-panel {
position: absolute;
left: 0;
right: 0;
top: calc(100% + 6px);
background: #fff;
border: 1px solid #d1d5db;
border-radius: 12px;
box-shadow: 0 10px 24px rgba(0,0,0,0.08);
padding: 8px 12px;
z-index: 30;
display: none;
}
.multi-select.open .multi-select-panel {
display: block;
}
.subsidy-option {
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
padding: 10px 0;
border-bottom: 1px solid #eceff3;
}
.subsidy-option:last-child {
border-bottom: none;
}
.subsidy-option-left {
display: flex;
align-items: center;
gap: 8px;
flex: 1;
min-width: 0;
}
.subsidy-option-left input[type="checkbox"] {
width: 16px;
height: 16px;
margin: 0;
}
.subsidy-option-name {
color: #111827;
line-height: 1.4;
word-break: break-all;
}
.subsidy-option-price {
font-size: 13px;
font-weight: 700;
color: #374151;
white-space: nowrap;
}
.subsidy-option.disabled-item .subsidy-option-name,.subsidy-option.disabled-item .subsidy-option-price {
color: #9ca3af;
}
.manual-discount-divider {
position: relative;
margin-top: 10px;
padding-top: 14px;
}
.manual-discount-divider::before {
content: "";
position: absolute;
left: 0;
right: 0;
top: 50%;
border-top: 1px dashed #d7dee8;
transform: translateY(-50%);
}
.manual-expand-wrap {
position: relative;
z-index: 1;
display: flex;
justify-content: center;
}
.manual-expand-btn {
display: inline-flex;
align-items: center;
justify-content: center;
min-width: auto;
padding: 6px 14px;
border-radius: 999px;
background: #fff;
border: 1px solid #d1d5db;
color: #374151;
font-size: 12px;
font-weight: 600;
flex: 0 0 auto;
box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.manual-discount-panel {
display: none;
padding-top: 14px;
}
.manual-discount-panel.show {
display: block;
}
.extra-discount-wrap {
padding-bottom: 10px;
margin-bottom: 12px;
border-bottom: 1px dashed #d7dee8;
}
.extra-discount-title {
font-size: 14px;
font-weight: 700;
color: #111827;
margin-bottom: 8px;
}
.manual-discount-title {
font-size: 14px;
font-weight: 700;
color: #111827;
margin-bottom: 12px;
}
.manual-discount-inputs {
display: grid;
grid-template-columns: 1fr 120px 96px;
gap: 12px;
align-items: center;
}
.manual-discount-inputs input {
background: #fff;
}
.manual-add-btn {
background: linear-gradient(135deg,#3b82f6,#2563eb);
color: #fff;
border-radius: 16px;
min-width: auto;
}
.manual-discount-list-title {
font-size: 14px;
font-weight: 700;
color: #111827;
margin-top: 14px;
margin-bottom: 8px;
}
.manual-discount-empty {
font-size: 12px;
color: #9ca3af;
line-height: 1.8;
}
.manual-discount-item {
display: flex;
justify-content: space-between;
align-items: center;
gap: 10px;
padding: 10px 0;
border-bottom: 1px solid #eceff3;
}
.manual-discount-item:last-child {
border-bottom: none;
}
.manual-discount-item-left {
min-width: 0;
flex: 1;
}
.manual-discount-item-name {
color: #111827;
line-height: 1.5;
word-break: break-all;
}
.manual-discount-item-right {
display: flex;
align-items: center;
gap: 8px;
flex: 0 0 auto;
}
.manual-discount-item-price {
color: #374151;
font-weight: 700;
white-space: nowrap;
}
.manual-delete-btn {
background: #ef4444;
color: #fff;
border-radius: 10px;
padding: 6px 10px;
font-size: 12px;
min-width: auto;
flex: 0 0 auto;
}
@media (max-width:390px) {
.container {
padding: 8px 8px 20px;
}
.panel,.quote-card,.image-preview-card {
padding: 12px;
border-radius: 12px;
}
.big-money {
font-size: 16px;
}
.money-label {
font-size: 11px;
}
.line,.detail-line,.section-row {
font-size: 13px;
}
.strong-line .value {
font-size: 15px;
}
.strong-line-same-size .value {
font-size: 15px;
}
.top-money {
gap: 6px;
}
.manual-discount-inputs {
grid-template-columns: 1fr 92px 72px;
gap: 8px;
}
.manual-expand-btn {
padding: 5px 12px;
}
}
@media (min-width:768px) {
.container {
max-width: 760px;
}
.form-grid {
grid-template-columns: 1fr 1fr;
}
.full {
grid-column: span 2;
}
}
</style>
</head>
<body>
<div class="container">
<div class="panel">
<div class="title-bar">
<img src="/logo.png" alt="logo" class="title-logo">
<div class="title">理想汽车报价单</div>
</div>
<div class="sub">Design by Jeff V1.1<br>- 1，支持手动输入优惠</div>

<div class="form-grid">
<div class="form-group full">
<label for="model">选择车型</label>
<select id="model"></select>
</div>

<div class="form-group">
<label for="guidePrice">全国统一零售价</label>
<input type="text" id="guidePrice" readonly />
</div>

<div class="form-group full">
<label>可选配置</label>
<div class="config-box" id="optionalConfigArea"></div>
</div>

<div class="form-group full">
<label>可选优惠</label>
<div class="config-box">
<div id="optionalDiscountArea"></div>

<div class="manual-discount-divider">
<div class="manual-expand-wrap">
<button type="button" class="manual-expand-btn" id="manualDiscountToggle">展开</button>
</div>
</div>

<div class="manual-discount-panel" id="manualDiscountPanel">
<div id="extraDiscountArea"></div>

<div class="manual-discount-title">手动添加优惠</div>
<div class="manual-discount-inputs">
<input type="text" id="manualDiscountNameInput" placeholder="输入优惠明细" />
<input type="number" id="manualDiscountPriceInput" placeholder="金额" />
<button type="button" class="manual-add-btn" id="addManualDiscountBtn">添加</button>
</div>

<div class="manual-discount-list-title">已添加手动优惠</div>
<div id="manualDiscountArea"></div>
</div>
</div>
</div>

<div class="form-group">
<label for="insurance">保险预估</label>
<input type="number" id="insurance" />
</div>

<div class="form-group">
<label>政府补贴</label>
<div class="multi-select" id="govSubsidyMultiSelect">
<div class="multi-select-trigger" id="govSubsidyTrigger" tabindex="0">
<span id="govSubsidyText" class="multi-select-placeholder">请选择政府补贴</span>
</div>
<div class="multi-select-panel" id="govSubsidyPanel">
<label class="subsidy-option" id="govSubsidyScrapWrap">
<div class="subsidy-option-left">
<input type="checkbox" class="gov-subsidy-checkbox" value="scrap" />
<span class="subsidy-option-name">报废补贴</span>
</div>
<span class="subsidy-option-price" id="govSubsidyScrapPrice">-￥20,000</span>
</label>

<label class="subsidy-option" id="govSubsidyReplaceWrap">
<div class="subsidy-option-left">
<input type="checkbox" class="gov-subsidy-checkbox" value="replace" />
<span class="subsidy-option-name">置换补贴</span>
</div>
<span class="subsidy-option-price" id="govSubsidyReplacePrice">-￥15,000</span>
</label>

<label class="subsidy-option" id="govSubsidyShijingshanWrap">
<div class="subsidy-option-left">
<input type="checkbox" class="gov-subsidy-checkbox" value="shijingshan" />
<span class="subsidy-option-name">石景山补贴</span>
</div>
<span class="subsidy-option-price" id="govSubsidyShijingshanPrice">当前开票价不满足</span>
</label>
</div>
</div>
</div>

<div class="form-group">
<label for="financeType">购车方案</label>
<select id="financeType"></select>
</div>

<div class="form-group full" id="downPaymentGroup">
<label for="downPaymentRatio">首付比例</label>
<div class="downpay-wrap">
<div class="downpay-top">
<span id="downPaymentPercentText">30%</span>
<div class="amount-input-wrap">
<span>¥</span>
<input type="number" id="downPaymentAmountInput" value="0" />
</div>
</div>
<input type="range" id="downPaymentRatio" min="0" max="90" step="1" value="30" />
<div class="downpay-scale">
<span>0%</span>
<span>90%</span>
</div>
<div class="min-downpay-note" id="minDownPaymentNote"></div>
</div>
</div>

<div class="form-group" id="loanYearsGroup">
<label for="loanYears">分期期数</label>
<select id="loanYears">
<option value="1">1年（12期）</option>
<option value="2">2年（24期）</option>
<option value="3">3年（36期）</option>
<option value="4">4年（48期）</option>
<option value="5" selected>5年（60期）</option>
</select>
</div>
</div>

<div class="btn-row">
<button class="btn-primary" onclick="calculateQuote()">计算</button>
<button class="btn-secondary" onclick="resetForm()">重置</button>
<button class="btn-export" onclick="generateQuotePreview()">生成图片</button>
</div>
</div>

<div class="quote-card" id="quoteCaptureArea">
<div class="quote-head">
<img src="/logo.png" alt="logo" class="quote-logo">
<div class="car-name" id="carName">理想汽车</div>
</div>
<div id="financeCardArea"></div>
</div>

<div class="image-preview-card" id="imagePreviewCard">
<div class="image-preview-title">报价单图片已生成</div>
<div class="image-preview-hint">长按下方图片保存到相册</div>
<div class="image-preview-wrap">
<a data-pswp-width='512' data-pswp-height='512' target='_blank' href=""><img id="previewImage" src="" alt="报价单图片" /></a>
</div>
<button class="btn-preview-close" onclick="closeImagePreview()">关闭预览</button>
</div>

function round2(num) {
return Math.round(num);
}

function formatMoney(num, digits = 0) {
return Number(num).toLocaleString("zh-CN", {
minimumFractionDigits: digits,
maximumFractionDigits: digits
});
}

function calculatePurchaseTax(invoicePrice) {
return round2(invoicePrice / 1.13 * 0.1 - Math.min(invoicePrice / 1.13 * 0.05, 15000));
}

function initModels() {

});

function getCurrentCar() {

function isMegaCar(carName) {

function getMinDownPayment(carName, financeType) {
if (carName === "理想 i6" && (financeType === "3free" || financeType === "5m3")) return 79800;
if (carName === "理想 i8" && (financeType === "3free" || financeType === "5m3")) return 99800;
return 0;
}

function getFinanceOptionsForCar(car) {
if (car.name === "理想 i6") return FINANCE_OPTIONS_I6;
if (car.name === "理想 i8") return FINANCE_OPTIONS_I8;
if (isLSeries(car.name)) return FINANCE_OPTIONS_L_SERIES;

}

financeEl.value = options.some(item => item.value === currentValue) ? currentValue : "full";
}

function getCurrentOptionalConfigs() {
return optionalConfigMap[getCurrentCar().name] || [];
}

function getCurrentOptionalDiscounts() {
return optionalDiscountMap[getCurrentCar().name] || [];
}

function getCurrentExtraDiscounts() {
return extraDiscountMap[getCurrentCar().name] || [];
}

function getSelectedItems(items, ids) {
return items.filter(item => ids.includes(item.id));
}

function sumPrices(items) {
return items.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
}

function getSelectedOptionalConfigs() {
return getSelectedItems(getCurrentOptionalConfigs(), selectedConfigIds);
}

function getSelectedOptionalDiscounts() {
return getSelectedItems(getCurrentOptionalDiscounts(), selectedDiscountIds);
}

function getSelectedExtraDiscounts() {
return getSelectedItems(getCurrentExtraDiscounts(), selectedExtraDiscountIds);
}

function getOptionalConfigTotal() {
return sumPrices(getSelectedOptionalConfigs());
}

function getOptionalDiscountTotal() {
return sumPrices(getSelectedOptionalDiscounts());
}

function getExtraDiscountTotal() {
return sumPrices(getSelectedExtraDiscounts());
}

function getValidManualDiscounts() {
return manualDiscounts.filter(item => (item.name || "").trim() && Number(item.price) > 0);
}

function getManualDiscountTotal() {
return sumPrices(getValidManualDiscounts());
}

function getCurrentInvoicePrice() {
const car = getCurrentCar();
return Math.max(0, car.price + getOptionalConfigTotal() - getOptionalDiscountTotal() - getExtraDiscountTotal() - getManualDiscountTotal());
}

function hasSelectedDistrictDiscount() {
return getSelectedOptionalDiscounts().some(item => item.subsidyType === "district");
}

function getShijingshanSubsidy(invoicePrice) {
if (invoicePrice > 200000 && invoicePrice < 300000) return 3000;
if (invoicePrice >= 300000 && invoicePrice < 500000) return 5000;
if (invoicePrice >= 500000) return 8000;
return 0;
}

function normalizeGovSubsidySelection(changedValue = "") {
if (changedValue === "scrap" && selectedGovSubsidyIds.includes("scrap")) {
selectedGovSubsidyIds = selectedGovSubsidyIds.filter(id => id !== "replace");
}
if (changedValue === "replace" && selectedGovSubsidyIds.includes("replace")) {
selectedGovSubsidyIds = selectedGovSubsidyIds.filter(id => id !== "scrap");
}
if (hasSelectedDistrictDiscount()) {
selectedGovSubsidyIds = selectedGovSubsidyIds.filter(id => id !== "shijingshan");
}
}

function getGovSubsidyInfo(invoicePrice = 0) {
let subsidyValue = 0;
const subsidyItems = [];
const districtDiscountSelected = hasSelectedDistrictDiscount();

if (selectedGovSubsidyIds.includes("scrap")) {
subsidyValue += 20000;
subsidyItems.push({ name: "报废补贴", amount: 20000 });
}
if (selectedGovSubsidyIds.includes("replace")) {
subsidyValue += 15000;
subsidyItems.push({ name: "置换补贴", amount: 15000 });
}
if (selectedGovSubsidyIds.includes("shijingshan") && !districtDiscountSelected) {
const shijingshanAmount = getShijingshanSubsidy(invoicePrice);
if (shijingshanAmount > 0) {
subsidyValue += shijingshanAmount;
subsidyItems.push({ name: "石景山补贴", amount: shijingshanAmount });
}
}
return { subsidyValue, subsidyItems };
}

function updateGovSubsidyDynamicDisplay() {
const invoicePrice = getCurrentInvoicePrice();
const districtDiscountSelected = hasSelectedDistrictDiscount();
const shijingshanAmount = getShijingshanSubsidy(invoicePrice);
const scrapChecked = selectedGovSubsidyIds.includes("scrap");
const replaceChecked = selectedGovSubsidyIds.includes("replace");

const scrapCheckbox = document.querySelector('.gov-subsidy-checkbox[value="scrap"]');
const replaceCheckbox = document.querySelector('.gov-subsidy-checkbox[value="replace"]');
const shijingshanCheckbox = document.querySelector('.gov-subsidy-checkbox[value="shijingshan"]');
const scrapWrap = document.getElementById("govSubsidyScrapWrap");
const replaceWrap = document.getElementById("govSubsidyReplaceWrap");
const shijingshanWrap = document.getElementById("govSubsidyShijingshanWrap");
const shijingshanPrice = document.getElementById("govSubsidyShijingshanPrice");

document.getElementById("govSubsidyScrapPrice").textContent = "-￥20,000";
document.getElementById("govSubsidyReplacePrice").textContent = "-￥15,000";

scrapCheckbox.disabled = replaceChecked;
replaceCheckbox.disabled = scrapChecked;
scrapWrap.classList.toggle("disabled-item", replaceChecked);
replaceWrap.classList.toggle("disabled-item", scrapChecked);

if (districtDiscountSelected) {
shijingshanCheckbox.checked = false;
shijingshanCheckbox.disabled = true;
shijingshanWrap.classList.add("disabled-item");
shijingshanPrice.textContent = "已与可选优惠区补贴互斥";
selectedGovSubsidyIds = selectedGovSubsidyIds.filter(id => id !== "shijingshan");
} else {
shijingshanCheckbox.disabled = false;
shijingshanWrap.classList.remove("disabled-item");
shijingshanPrice.textContent = shijingshanAmount > 0 ? `-￥${formatMoney(shijingshanAmount)}` : "当前开票价不满足";
}
}

function updateGovSubsidyText() {
const districtDiscountSelected = hasSelectedDistrictDiscount();
if (districtDiscountSelected) {
selectedGovSubsidyIds = selectedGovSubsidyIds.filter(id => id !== "shijingshan");
}
const textEl = document.getElementById("govSubsidyText");
if (!selectedGovSubsidyIds.length) {
textEl.textContent = "请选择政府补贴";
textEl.className = "multi-select-placeholder";
return;
}
const labels = [];
if (selectedGovSubsidyIds.includes("scrap")) labels.push("报废补贴");
if (selectedGovSubsidyIds.includes("replace")) labels.push("置换补贴");
if (selectedGovSubsidyIds.includes("shijingshan") && !districtDiscountSelected) labels.push("石景山补贴");
textEl.textContent = labels.length ? labels.join("、") : "请选择政府补贴";
textEl.className = labels.length ? "" : "multi-select-placeholder";
}

function renderGovSubsidySelection() {
updateGovSubsidyDynamicDisplay();

function handleConfigMutualExclusion(changedId, checked) {
const car = getCurrentCar();

if (car.name === "理想 i6") {
const awdId = "i6_awd";
const wheelId = "i6_wheel_21";
if (changedId === awdId && checked) selectedConfigIds = selectedConfigIds.filter(id => id !== wheelId);
if (changedId === wheelId && checked) selectedConfigIds = selectedConfigIds.filter(id => id !== awdId);
}

if (car.name === "理想 L9 Livis") {
const specialColorId = "l9livis_special_color";
const dualColorId = "l9livis_dual_color";
if (changedId === specialColorId && checked) selectedConfigIds = selectedConfigIds.filter(id => id !== dualColorId);
if (changedId === dualColorId && checked) selectedConfigIds = selectedConfigIds.filter(id => id !== specialColorId);
}

if (car.name === "理想 L8 Livis") {
const specialColorId = "l8livis_special_color";
const dualColorId = "l8livis_dual_color";
if (changedId === specialColorId && checked) selectedConfigIds = selectedConfigIds.filter(id => id !== dualColorId);
if (changedId === dualColorId && checked) selectedConfigIds = selectedConfigIds.filter(id => id !== specialColorId);
}
}

function refreshAfterPriceAffect() {
const invoicePrice = getCurrentInvoicePrice();
if (!isEditingDownPayment) syncDownPaymentByRatio(invoicePrice);
else syncDownPaymentByAmount(invoicePrice, false);
renderGovSubsidySelection();
calculateQuote();
}

function renderOptionalConfigs() {
const area = document.getElementById("optionalConfigArea");
const configs = getCurrentOptionalConfigs();
const car = getCurrentCar();

if (!configs.length) {
area.innerHTML = `<div class="config-empty">当前车型暂无可选配置</div>`;
return;
}

const state = {
awdSelected: selectedConfigIds.includes("i6_awd"),
wheelSelected: selectedConfigIds.includes("i6_wheel_21"),
l9Special: selectedConfigIds.includes("l9livis_special_color"),
l9Dual: selectedConfigIds.includes("l9livis_dual_color"),
l8Special: selectedConfigIds.includes("l8livis_special_color"),
l8Dual: selectedConfigIds.includes("l8livis_dual_color")
};

area.innerHTML = configs.map(item => {
let disabled = false;
if (car.name === "理想 i6") {
if (item.id === "i6_wheel_21" && state.awdSelected) disabled = true;
if (item.id === "i6_awd" && state.wheelSelected) disabled = true;
}
if (car.name === "理想 L9 Livis") {
if (item.id === "l9livis_special_color" && state.l9Dual) disabled = true;
if (item.id === "l9livis_dual_color" && state.l9Special) disabled = true;
}
if (car.name === "理想 L8 Livis") {
if (item.id === "l8livis_special_color" && state.l8Dual) disabled = true;
if (item.id === "l8livis_dual_color" && state.l8Special) disabled = true;
}
return `
<label class="config-item ${disabled ? "disabled-item" : ""}">
<div class="config-left">
<input type="checkbox" class="optional-config-checkbox" value="${item.id}" ${selectedConfigIds.includes(item.id) ? "checked" : ""} ${disabled ? "disabled" : ""} />
<span class="config-name">${item.name}</span>
</div>
<span class="config-price">￥${formatMoney(item.price)}</span>
</label>
`;
}).join("");

const checked = e.target.checked;
selectedConfigIds = Array.from(document.querySelectorAll(".optional-config-checkbox:checked")).map(i => i.value);
handleConfigMutualExclusion(changedId, checked);
renderOptionalConfigs();
refreshAfterPriceAffect();
});

}

function updateSliderBackground(ratio) {
document.getElementById("downPaymentRatio").style.background = `linear-gradient(to right,#0f766e 0%,#0f766e ${ratio}%,#e5e7eb ${ratio}%,#e5e7eb 100%)`;
}

function updateMinDownPaymentNote() {
const car = getCurrentCar();
const financeType = document.getElementById("financeType").value;
const minDownPayment = getMinDownPayment(car.name, financeType);
document.getElementById("minDownPaymentNote").innerText = financeType === "full" ? "" : (minDownPayment > 0 ? `当前方案最低首付：¥${formatMoney(minDownPayment)}` : "");
}

function enforceMinDownPayment(baseAmount = 0) {
const car = getCurrentCar();
const financeType = document.getElementById("financeType").value;
const minDownPayment = getMinDownPayment(car.name, financeType);
let current = parseFloat(document.getElementById("downPaymentAmountInput").value);
if (isNaN(current)) current = 0;
if (current < minDownPayment) current = minDownPayment;
if (current > baseAmount) current = baseAmount;
document.getElementById("downPaymentAmountInput").value = Math.round(current);
syncDownPaymentByAmount(baseAmount, true);
updateMinDownPaymentNote();
}

function syncDownPaymentByRatio(baseAmount = 0) {
const ratio = parseFloat(document.getElementById("downPaymentRatio").value) || 0;
const car = getCurrentCar();
const financeType = document.getElementById("financeType").value;
const minDownPayment = getMinDownPayment(car.name, financeType);
let amount = round2(baseAmount * ratio / 100);
if (amount < minDownPayment) amount = minDownPayment;
if (amount < 0) amount = 0;
if (amount > baseAmount) amount = baseAmount;
let finalRatio = baseAmount > 0 ? Math.round(amount / baseAmount * 100) : 0;
if (finalRatio > 90) finalRatio = 90;
document.getElementById("downPaymentRatio").value = finalRatio;
document.getElementById("downPaymentPercentText").innerText = `${finalRatio}%`;
document.getElementById("downPaymentAmountInput").value = Math.round(amount);
updateSliderBackground(finalRatio);
updateMinDownPaymentNote();
}

function syncDownPaymentByAmount(baseAmount = 0, forceClamp = false) {
const amountInput = document.getElementById("downPaymentAmountInput");
let amount = parseFloat(amountInput.value);
if (isNaN(amount)) amount = 0;
const car = getCurrentCar();
const financeType = document.getElementById("financeType").value;
const minDownPayment = getMinDownPayment(car.name, financeType);

if (forceClamp) {
if (amount < minDownPayment) amount = minDownPayment;
if (amount < 0) amount = 0;
if (amount > baseAmount) amount = baseAmount;
} else {
if (amount < 0) amount = 0;
if (amount > baseAmount) amount = baseAmount;
}

let ratio = baseAmount > 0 ? round2(amount / baseAmount * 100) : 0;
if (ratio > 90) ratio = 90;
const ratioInt = Math.round(ratio);
document.getElementById("downPaymentRatio").value = ratioInt;
document.getElementById("downPaymentPercentText").innerText = `${ratioInt}%`;
if (forceClamp) document.getElementById("downPaymentAmountInput").value = Math.round(amount);
updateSliderBackground(ratioInt);
updateMinDownPaymentNote();
}

function toggleFinanceFields() {
const financeType = document.getElementById("financeType").value;
const downPaymentGroup = document.getElementById("downPaymentGroup");
const loanYearsGroup = document.getElementById("loanYearsGroup");

if (financeType === "full") {
downPaymentGroup.style.display = "none";
loanYearsGroup.style.display = "none";
} else if (financeType === "3free") {
downPaymentGroup.style.display = "";
loanYearsGroup.style.display = "none";
document.getElementById("loanYears").value = "3";
} else if (financeType === "5m3") {
downPaymentGroup.style.display = "";
loanYearsGroup.style.display = "none";
document.getElementById("loanYears").value = "5";
} else {
downPaymentGroup.style.display = "";
loanYearsGroup.style.display = "";
}
updateMinDownPaymentNote();
}

function renderManualDiscounts() {
const area = document.getElementById("manualDiscountArea");

if (!manualDiscounts.length) {
area.innerHTML = `<div class="manual-discount-empty">暂无手动优惠</div>`;
return;
}

area.innerHTML = manualDiscounts.map((item, index) => `
<div class="manual-discount-item">
<div class="manual-discount-item-left">
<div class="manual-discount-item-name">${item.name}</div>
</div>
<div class="manual-discount-item-right">
<span class="manual-discount-item-price">-￥${formatMoney(item.price)}</span>
<button type="button" class="manual-delete-btn" data-index="${index}">删除</button>
</div>
</div>
`).join("");

document.querySelectorAll(".manual-delete-btn").forEach(el => {
el.addEventListener("click", function () {
const index = Number(el.dataset.index);
manualDiscounts.splice(index, 1);
renderManualDiscounts();
refreshAfterPriceAffect();
});
});
}

function addManualDiscount() {
const nameInput = document.getElementById("manualDiscountNameInput");
const priceInput = document.getElementById("manualDiscountPriceInput");
const name = (nameInput.value || "").trim();
const price = Math.max(0, Number(priceInput.value) || 0);

if (!name || !price) return;

manualDiscounts.push({ name, price });
nameInput.value = "";
priceInput.value = "";
renderManualDiscounts();
refreshAfterPriceAffect();
}

function toggleManualDiscountPanel() {
const panel = document.getElementById("manualDiscountPanel");
const btn = document.getElementById("manualDiscountToggle");
const isShow = panel.classList.toggle("show");
btn.textContent = isShow ? "收起" : "展开";
}

function updateCarInfo() {
const car = getCurrentCar();
document.getElementById("guidePrice").value = car.price;
document.getElementById("insurance").value = car.insurance;
selectedConfigIds = [];
selectedExtraDiscountIds = [];
const discounts = optionalDiscountMap[car.name] || [];
selectedDiscountIds = discounts.filter(item => item.defaultChecked).map(item => item.id);
renderFinanceOptions();
toggleFinanceFields();
renderOptionalConfigs();
renderOptionalDiscounts();
renderExtraDiscounts();
renderGovSubsidySelection();
renderManualDiscounts();
syncDownPaymentByRatio(getCurrentInvoicePrice());
calculateQuote();
}

function renderPriceLine(label, value, isDiscount = false) {
return `
<div class="line">
<span class="label">${label}</span>
<span class="value">${isDiscount ? "-" : ""}￥${formatMoney(value)}</span>
</div>
`;
}

function renderSelectedLines(items, isDiscount = false) {
if (!items.length) return "";
return items.map(item => renderPriceLine(item.name, item.price, isDiscount)).join("");
}

function renderManualDiscountLines() {
return getValidManualDiscounts().map(item => renderPriceLine(item.name, item.price, true)).join("");
}

function renderBaseQuote(invoicePrice, insurance, tax, totalPrice, subsidyItems, subsidyValue, actualCost) {
let subsidyHtml = "";
if (subsidyValue > 0) {
subsidyHtml = `
<div class="divider"></div>
<div class="section-hint">政府补贴（以政府公告为准，需自行申领与车企无关）</div>
${subsidyItems.map(item => renderPriceLine(item.name, item.amount, true)).join("")}
<div class="strong-line">
<span class="label">实际花费</span>
<span class="value">￥${formatMoney(actualCost)}</span>
</div>
`;
}

return `
<div class="quote-lines">
<div class="strong-line-same-size">
<span class="label">开票价</span>
<span class="value">￥${formatMoney(invoicePrice)}</span>
</div>
${renderPriceLine("保险预估", insurance)}
${renderPriceLine("购置税", tax)}
<div class="strong-line">
<span class="label">购车总价</span>
<span class="value">￥${formatMoney(totalPrice)}</span>
</div>
${subsidyHtml}
</div>
`;
}

function renderFinanceTop(downPayment, loanAmount, firstPayTotal, financeName, periods) {
const total = downPayment + loanAmount;
const ratio = total > 0 ? Math.round(downPayment / total * 100) : 0;
return `
<div class="section-row finance-first-row">
<strong>金融产品</strong>
<span class="scheme-value">${financeName}</span>
</div>
<div class="section-row">
<strong>分期期数</strong>
<span class="scheme-value">${periods}</span>
</div>
<div class="top-money">
<div class="money-box left">
<div class="big-money">￥${formatMoney(downPayment)}</div>
<div class="money-label">首付金额（${ratio}%）</div>
</div>
<div class="money-box center">
<div class="big-money">￥${formatMoney(loanAmount)}</div>
<div class="money-label">贷款/融资金额</div>
</div>
<div class="money-box right money-red">
<div class="big-money">￥${formatMoney(firstPayTotal)}</div>
<div class="money-label">首付合计</div>
</div>
</div>
`;
}

function renderFinanceTaxInsurance(insurance, tax) {
return `
<div class="quote-lines">
${renderPriceLine("保险预估", insurance)}
${renderPriceLine("购置税", tax)}
</div>
`;
}

function renderFreePlan(downPayment, loanAmount, insurance, tax, years, financeName) {
const months = years * 12;
const monthlyPayment = loanAmount / months;
const firstPayTotal = round2(downPayment + insurance + tax);

return `
${renderFinanceTop(downPayment, loanAmount, firstPayTotal, financeName, `${months}期`)}
${renderFinanceTaxInsurance(insurance, tax)}
<div class="stage-block">
<div class="stage-title">1-${months}期 <span class="tag">单阶段</span></div>
<div class="detail-line"><span class="detail-left">预估月付</span><span class="detail-right">￥${formatMoney(monthlyPayment)}</span></div>
<div class="detail-line"><span class="detail-left">利息</span><span class="detail-right">￥0</span></div>
<div class="detail-line"><span class="detail-left">年化费率</span><span class="detail-right">0.00%</span></div>
<div class="rate-note">折算年化利率0.00%</div>
</div>
`;
}

function render5M3(loanAmount, downPayment, insurance, tax) {
const phase2Months = 24;
const phase1Monthly = loanAmount / 60;
const remainPrincipal = loanAmount / 5 * 2;
const phase2Interest = round2(loanAmount * 1.99 / 100 * 2);
const phase2Total = remainPrincipal + phase2Interest;
const phase2Monthly = round2(phase2Total / phase2Months);
const firstPayTotal = round2(downPayment + insurance + tax);

return `
${renderFinanceTop(downPayment, loanAmount, firstPayTotal, "限时5免3", "60期")}
${renderFinanceTaxInsurance(insurance, tax)}
<div class="stage-block">
<div class="stage-title">1-36期 <span class="tag">第1阶段</span></div>
<div class="detail-line"><span class="detail-left">预估月付</span><span class="detail-right">￥${formatMoney(phase1Monthly)}</span></div>
<div class="detail-line"><span class="detail-left">利息</span><span class="detail-right">￥0</span></div>
<div class="detail-line"><span class="detail-left">年化费率</span><span class="detail-right">0.00%</span></div>
<div class="rate-note">折算年化利率0.00%</div>
</div>
<div class="stage-block">
<div class="stage-title">37-60期 <span class="tag">第2阶段</span></div>
<div class="detail-line"><span class="detail-left">预估月付</span><span class="detail-right">￥${formatMoney(phase2Monthly)}</span></div>
<div class="detail-line"><span class="detail-left">利息</span><span class="detail-right">￥${formatMoney(phase2Interest)}</span></div>
<div class="detail-line"><span class="detail-left">剩余应还本金</span><span class="detail-right">￥${formatMoney(remainPrincipal)}</span></div>
<div class="detail-line"><span class="detail-left">年化费率</span><span class="detail-right">1.99%</span></div>
<div class="rate-note">近似年化利率3.80%</div>
</div>
`;
}

function renderRatePlan(downPayment, loanAmount, insurance, tax, years, annualRate, annualRateText, approxRateText) {
const months = years * 12;
const interest = round2(loanAmount * annualRate / 100 * years);
const totalRepayment = round2(loanAmount + interest);
const monthlyPayment = round2(totalRepayment / months);
const firstPayTotal = round2(downPayment + insurance + tax);

return `
${renderFinanceTop(downPayment, loanAmount, firstPayTotal, annualRateText, `${months}期`)}
${renderFinanceTaxInsurance(insurance, tax)}
<div class="stage-block">
<div class="stage-title">1-${months}期 <span class="tag">单阶段</span></div>
<div class="detail-line"><span class="detail-left">预估月付</span><span class="detail-right">￥${formatMoney(monthlyPayment)}</span></div>
<div class="detail-line"><span class="detail-left">利息</span><span class="detail-right">￥${formatMoney(interest)}</span></div>
<div class="detail-line"><span class="detail-left">总还款</span><span class="detail-right">￥${formatMoney(totalRepayment)}</span></div>
<div class="detail-line"><span class="detail-left">年费率</span><span class="detail-right">${annualRate}%</span></div>
<div class="rate-note">近似年化利率${approxRateText}</div>
</div>
`;
}

function calculateQuote() {
const car = getCurrentCar();
const guidePrice = car.price;
const insurance = parseFloat(document.getElementById("insurance").value) || 0;
const financeType = document.getElementById("financeType").value;
const loanYears = parseInt(document.getElementById("loanYears").value) || 3;
const selectedConfigs = getSelectedOptionalConfigs();
const selectedDiscounts = getSelectedOptionalDiscounts();
const selectedExtraDiscounts = getSelectedExtraDiscounts();
const validManualDiscounts = getValidManualDiscounts();

const invoicePrice = Math.max(0, guidePrice + sumPrices(selectedConfigs) - sumPrices(selectedDiscounts) - sumPrices(selectedExtraDiscounts) - sumPrices(validManualDiscounts));
const { subsidyValue, subsidyItems } = getGovSubsidyInfo(invoicePrice);
const tax = calculatePurchaseTax(invoicePrice);
const totalPrice = invoicePrice + insurance + tax;
const actualCost = Math.max(0, totalPrice - subsidyValue);

let downPayment = parseFloat(document.getElementById("downPaymentAmountInput").value);
if (isNaN(downPayment)) downPayment = 0;

const minDownPayment = getMinDownPayment(car.name, financeType);
if (!isEditingDownPayment) {
if (downPayment < minDownPayment) downPayment = minDownPayment;
if (downPayment < 0) downPayment = 0;
if (downPayment > invoicePrice) downPayment = invoicePrice;
} else {
if (downPayment < 0) downPayment = 0;
if (downPayment > invoicePrice) downPayment = invoicePrice;
}

let downPaymentRatio = invoicePrice > 0 ? Math.round(downPayment / invoicePrice * 100) : 0;
if (downPaymentRatio > 90) downPaymentRatio = 90;
document.getElementById("downPaymentRatio").value = downPaymentRatio;
document.getElementById("downPaymentPercentText").innerText = `${downPaymentRatio}%`;
if (!isEditingDownPayment) document.getElementById("downPaymentAmountInput").value = Math.round(downPayment);
updateSliderBackground(downPaymentRatio);
updateGovSubsidyDynamicDisplay();

let loanAmount = invoicePrice - downPayment;
if (loanAmount < 0) loanAmount = 0;

document.getElementById("carName").innerText = car.name;

let html = `
<div class="quote-lines">
<div class="strong-line-same-size">
<span class="label">全国统一零售价</span>
<span class="value">￥${formatMoney(guidePrice)}</span>
</div>
${renderSelectedLines(selectedConfigs)}
${renderSelectedLines(selectedDiscounts, true)}
${renderSelectedLines(selectedExtraDiscounts, true)}
${renderManualDiscountLines()}
<div class="divider"></div>
</div>
`;

html += renderBaseQuote(invoicePrice, insurance, tax, totalPrice, subsidyItems, subsidyValue, actualCost);

if (financeType !== "full") {
if (financeType === "3free") {
html += renderFreePlan(downPayment, loanAmount, insurance, tax, 3, "3年免息");
} else if (financeType === "5m3") {
html += render5M3(loanAmount, downPayment, insurance, tax);
} else if (financeType === "rate199") {
html += renderRatePlan(downPayment, loanAmount, insurance, tax, loanYears, 1.99, "1.99%年费率", "3.80%");
} else if (financeType === "rate099") {
html += renderRatePlan(downPayment, loanAmount, insurance, tax, loanYears, 0.99, "限时0.99%低息", "1.92%");
} else if (financeType === "rate149") {
html += renderRatePlan(downPayment, loanAmount, insurance, tax, loanYears, 1.49, "限时1.49%低息", "2.86%");
}
}

document.getElementById("financeCardArea").innerHTML = html;
}

function resetForm() {
document.getElementById("model").selectedIndex = 0;
selectedGovSubsidyIds = [];
selectedExtraDiscountIds = [];
manualDiscounts = [];
document.getElementById("downPaymentRatio").value = "30";
document.getElementById("loanYears").value = "3";
closeImagePreview();
isEditingDownPayment = false;
document.getElementById("manualDiscountPanel").classList.remove("show");
document.getElementById("manualDiscountToggle").textContent = "展开";
document.getElementById("manualDiscountNameInput").value = "";
document.getElementById("manualDiscountPriceInput").value = "";
updateCarInfo();
calculateQuote();
}

function generateQuotePreview() {
const target = document.getElementById("quoteCaptureArea");
html2canvas(target, {
backgroundColor: "#ffffff",
scale: 2,
useCORS: true
}).then(canvas => {
document.getElementById("previewImage").src = canvas.toDataURL("image/png");
document.getElementById("imagePreviewCard").style.display = "block";
document.getElementById("imagePreviewCard").scrollIntoView({ behavior: "smooth", block: "start" });
});
}

function closeImagePreview() {
document.getElementById("imagePreviewCard").style.display = "none";
document.getElementById("previewImage").src = "";
}

window.onload = function () {
initModels();
updateCarInfo();
renderGovSubsidySelection();

document.getElementById("model").addEventListener("change", function () {
closeImagePreview();
isEditingDownPayment = false;
updateCarInfo();
});

document.getElementById("insurance").addEventListener("input", function () {
renderGovSubsidySelection();
calculateQuote();
});

document.getElementById("financeType").addEventListener("change", function () {
if (document.getElementById("financeType").value !== "full") {
clearFullOnlyDiscountSelections();
}
toggleFinanceFields();
renderOptionalDiscounts();
const invoicePrice = getCurrentInvoicePrice();
if (!isEditingDownPayment) enforceMinDownPayment(invoicePrice);
else syncDownPaymentByAmount(invoicePrice, false);
renderGovSubsidySelection();
calculateQuote();
});

document.getElementById("downPaymentRatio").addEventListener("input", function () {
isEditingDownPayment = false;
syncDownPaymentByRatio(getCurrentInvoicePrice());
renderGovSubsidySelection();
calculateQuote();
});

document.getElementById("downPaymentAmountInput").addEventListener("focus", function () {
isEditingDownPayment = true;
});

document.getElementById("downPaymentAmountInput").addEventListener("input", function () {
syncDownPaymentByAmount(getCurrentInvoicePrice(), false);
renderGovSubsidySelection();
calculateQuote();
});

document.getElementById("downPaymentAmountInput").addEventListener("blur", function () {
isEditingDownPayment = false;
enforceMinDownPayment(getCurrentInvoicePrice());
renderGovSubsidySelection();
calculateQuote();
});

document.getElementById("loanYears").addEventListener("change", calculateQuote);

document.getElementById("govSubsidyTrigger").addEventListener("click", function (e) {
e.stopPropagation();
toggleGovSubsidyDropdown();
});

document.getElementById("govSubsidyTrigger").addEventListener("keydown", function (e) {
if (e.key === "Enter" || e.key === " ") {
e.preventDefault();
toggleGovSubsidyDropdown();
}
if (e.key === "Escape") {
toggleGovSubsidyDropdown(false);
}
});

document.getElementById("govSubsidyPanel").addEventListener("click", function (e) {
e.stopPropagation();
});

document.querySelectorAll(".gov-subsidy-checkbox").forEach(el => {
el.addEventListener("change", function () {
selectedGovSubsidyIds = Array.from(document.querySelectorAll(".gov-subsidy-checkbox:checked")).map(i => i.value);
normalizeGovSubsidySelection(el.value);
renderGovSubsidySelection();
calculateQuote();
});
});

document.addEventListener("click", function () {
toggleGovSubsidyDropdown(false);
});

document.getElementById("manualDiscountToggle").addEventListener("click", toggleManualDiscountPanel);
document.getElementById("addManualDiscountBtn").addEventListener("click", addManualDiscount);

document.getElementById("manualDiscountNameInput").addEventListener("keydown", function (e) {
if (e.key === "Enter") addManualDiscount();
});

document.getElementById("manualDiscountPriceInput").addEventListener("keydown", function (e) {
if (e.key === "Enter") addManualDiscount();
});
};
</script>
</body>
</html>
